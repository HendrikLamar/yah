<h1>💶 Finanzanalyse <span id="year"></span></h1>
<div class="sub" id="meta"></div>

<div class="tabnav" id="tabbar"></div>
<div id="panels"></div>

<template id="tpl-account">
  <div class="tabpanel">
    <div class="kpibar"><div class="grid kpis" data-el="kpis"></div></div>
    <div class="note-box" data-el="caption"></div>

    <h2>Konto</h2>
    <div class="grid accts"><div class="card acard" data-el="acard"></div></div>

    <h2>Saldoentwicklung</h2>
    <div class="card"><canvas data-el="series" height="160"></canvas></div>

    <h2>Cashflow pro Monat</h2>
    <div class="sub">Einnahmen gegen Ausgaben. Interne Übertragungen zwischen eigenen Konten sind ausgeklammert.</div>
    <div class="card"><canvas data-el="cashflow" height="120"></canvas></div>

    <h2>Ausgaben nach Kategorie <span class="hint" style="font-weight:400">— Klick öffnet die Einzelbuchungen</span></h2>
    <div class="grid two">
      <div class="card"><canvas data-el="dough" height="200"></canvas></div>
      <div class="card"><div data-el="cattable"></div></div>
    </div>

    <h2 data-el="anchor">🔍 Einzelbuchungen</h2>
    <div class="card">
      <div class="controls">
        <span class="hint">Kategorie:</span><select data-el="fcat"></select>
        <span class="hint">Monat:</span><select data-el="fmonth"></select>
        <span class="chip" data-el="reset">Zurücksetzen</span>
        <span class="hint" data-el="count" style="margin-left:auto"></span>
      </div>
      <div class="dwrap"><div data-el="dtable"></div></div>
    </div>

    <h2>Ausgaben pro Monat nach Kategorie</h2>
    <div class="card"><canvas data-el="stack" height="130"></canvas></div>
  </div>
</template>

<template id="tpl-consolidated">
  <div class="tabpanel">
    <div class="kpibar"><div class="grid kpis" data-el="kpis"></div></div>
    <div class="note-box" data-el="caption"></div>

    <h2>Konten im Überblick</h2>
    <div class="grid accts" data-el="acards"></div>

    <h2>Cashflow pro Monat</h2>
    <div class="sub">Gemeinsames Einkommen gegen gemeinsame Ausgaben aller Konten.</div>
    <div class="card"><canvas data-el="cashflow" height="120"></canvas></div>

    <h2>Ausgaben nach Kategorie <span class="hint" style="font-weight:400">— Klick öffnet die Einzelbuchungen</span></h2>
    <div class="grid two">
      <div class="card"><canvas data-el="dough" height="200"></canvas></div>
      <div class="card"><div data-el="cattable"></div></div>
    </div>

    <h2 data-el="anchor">🔍 Einzelbuchungen</h2>
    <div class="card">
      <div class="controls">
        <span class="hint">Konto:</span><select data-el="facct"></select>
        <span class="hint">Kategorie:</span><select data-el="fcat"></select>
        <span class="hint">Monat:</span><select data-el="fmonth"></select>
        <span class="chip" data-el="reset">Zurücksetzen</span>
        <span class="hint" data-el="count" style="margin-left:auto"></span>
      </div>
      <div class="dwrap"><div data-el="dtable"></div></div>
    </div>

    <h2>Ausgaben pro Monat nach Kategorie</h2>
    <div class="card"><canvas data-el="stack" height="130"></canvas></div>
  </div>
</template>

<div class="foot" id="foot"></div>
