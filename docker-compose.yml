version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: yah-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yah}
      POSTGRES_DB: ${POSTGRES_DB:-yah}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yah} -d ${POSTGRES_DB:-yah}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yah-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-yah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yah}
      POSTGRES_DB: ${POSTGRES_DB:-yah}
      POSTGRES_SHADOW_DB: ${POSTGRES_SHADOW_DB:-yah_shadow}
      DATABASE_URL: postgresql://${POSTGRES_USER:-yah}:${POSTGRES_PASSWORD:-yah}@postgres:5432/${POSTGRES_DB:-yah}?schema=public
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-yah}:${POSTGRES_PASSWORD:-yah}@postgres:5432/${POSTGRES_DB:-yah}?schema=public
      SHADOW_DATABASE_URL: postgresql://${POSTGRES_USER:-yah}:${POSTGRES_PASSWORD:-yah}@postgres:5432/${POSTGRES_SHADOW_DB:-yah_shadow}?schema=public
    ports:
      - "3000:3000"
    command: >-
      sh -c "npm run prisma:generate && npm run prisma:db:push && npm run start"

volumes:
  postgres_data:
